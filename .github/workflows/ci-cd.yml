name: CI/CD Pipeline for Quant Trading Projects

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  schedule:
    - cron: '0 0 * * *'  # 每天运行一次

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '22'

jobs:
  check-projects:
    name: Check All Projects
    runs-on: windows-latest
    
    strategy:
      matrix:
        project: [ '0', '17', '33', '88' ]
        language: [ 'python', 'typescript' ]
    
    defaults:
      run:
        working-directory: ${{ github.workspace }}/${{ matrix.project }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python ${{ env.PYTHON_VERSION }}
        if: matrix.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        if: matrix.language == 'typescript'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ matrix.project }}/package-lock.json
      
      - name: Install Python dependencies
        if: matrix.language == 'python'
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Install TypeScript dependencies
        if: matrix.language == 'typescript'
        run: |
          npm ci
      
      - name: Build TypeScript build
        if: matrix.language == 'typescript'
        run: |
          npm run build
      
      - name: Run Python tests
        if: matrix.language == 'python'
        run: |
          if [ -d tests ]; then
            python -c "import sys; sys.path.insert(0, '.'); from importlib import import_module; import os; test_files = [f for f in os.listdir('tests') if f.startswith('test_') and f.endswith('.py')]; [__import__(f'tests.{f[:-3]', fromlist=['*']) for f in test_files]; print('Python tests completed')"
          fi
      
      - name: Run TypeScript tests
        if: matrix.language == 'typescript'
        run: |
          if [ -d tests ]; then
            npm test
          fi
      
      - name: Check test summary
        run: |
          echo "✅ Project ${{ matrix.project }} tests completed successfully"
